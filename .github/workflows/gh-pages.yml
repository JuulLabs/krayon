name: GitHub Pages
on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  deploy:
    if: github.repository_owner == 'JuulLabs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      - run: ./gradlew :documentation:wasmJsBrowserDistribution dokkaGeneratePublicationHtml

      - name: Assemble site
        run: |
          mkdir -p site/api
          cp -R documentation/build/dist/wasmJs/productionExecutable/. site/
          cp -R build/dokka/html/. site/api/
          touch site/.nojekyll

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
